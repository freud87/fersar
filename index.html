<!DOCTYPE html>
<html lang="fr">
    <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
            <title>Sarra & Ferid</title>

        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
            }

            body{
                height:100vh;
                background:linear-gradient(135deg,#f8fafc,#edf2f7,#dbeafe);
                display:flex;
                flex-direction:column;
            }

            #logo {
                position: absolute;
                top: 20px;
                right: 20px;
                width: 50px; 
                height: 50px; 
                border-radius: 50%; 
                background-image: url('fersar2.png'); 
                background-size: cover; 
                background-position: center;
                border: 1px solid #d4af37; /* Optionnel : un petit liseré doré pour rappeler le logo */
                flex-shrink: 0;
                view-transition-name: logo;
            }









            /**************** CENTRE ****************/

            main{

                flex:1;

                display:flex;
                justify-content:center;
                align-items:center;

            }

            .card{
                position:relative;
                background:white;

                width:min(900px,95%);

                border-radius:25px;

                box-shadow:0 15px 40px rgba(0,0,0,.12);

                padding:60px 30px;

                text-align:center;

            }
/* Menu réduit */
.menu-panel{
    position:absolute;
    top:20px;
    left:20px;

    width:140px;
    height:55px;

    background:#fff;
    border-radius:20px;

    overflow:hidden;

    transition:
        width .5s ease,
        height .5s ease,
        border-radius .5s ease;

    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

/* Menu ouvert */
.menu-panel.open{
    width:320px;
    height:420px;
    border-radius:25px;
}

/* En-tête */

/* Contenu */
.menu-content{
    opacity:0;
    visibility:hidden;

    padding:15px 25px;

    transition:.2s;
}

.menu-panel.open .menu-content{
    opacity:1;
    visibility:visible;
    transition-delay:.3s;
}

.menu-content ul{
    list-style:none;
}

.menu-content li{
    margin:18px 0;
}

.menu-content a{
    text-decoration:none;
    color:#111;
    font-size:22px;
    font-weight:700;
    transition:.3s;
}

.menu-content a:hover{
    padding-left:10px;
}
/**************************************************************/
.menu-header{
    height:55px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    cursor:pointer;
    font-weight:bold;
    user-select:none;
    transition:.4s;
}

.menu-header.close-mode{
    background:#e84d7a;
    color:#fff;
}

.menu-title{
    font-size:15px;
    letter-spacing:1px;
    pointer-events:none;   /* le texte n'est plus cliquable */
}

.menu-icon{
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;        /* seul l'icône est cliquable */
}

.menu-icon i{
    transition:
        transform .4s ease,
        opacity .3s ease;
}

.menu-panel.open .menu-icon i{
    transform:rotate(135deg);
}
/**************************************************************/

            .card h2{

                font-size:36px;
                color:#555;

            }

            .subtitle{

                margin-top:10px;
                color:#888;
                font-size:18px;

            }

            #countdown{

                margin-top:50px;

                display:flex;
                justify-content:center;
                gap:25px;
                flex-wrap:wrap;

            }

            .box{

                width:140px;

                background:#f8fafc;

                border-radius:20px;

                padding:25px 10px;

                box-shadow:0 5px 15px rgba(0,0,0,.08);

            }

            .value{

                font-size:52px;
                font-weight:bold;
                color:#e84d7a;

            }

            .label{

                margin-top:8px;
                color:#666;
                font-size:18px;

            }
        </style>
    </head>
    <body>
        <main>
            <div class="card">
            <div id="logo"></div>
            <div class="menu-panel" id="menu">
                <div class="menu-header" id="toggleMenu">
                    <span class="menu-title" id="menuText">MENU</span>
                    <span class="menu-icon">
                        <i class="bi bi-plus-lg" id="menuIcon"></i>
                    </span>
                </div>
                <div class="menu-content">
                    <ul>
                        <li><a href="#">Accueil</a></li>
                        <li><a href="#">Travaux</a></li>
                        <li><a href="#">Services</a></li>
                        <li><a href="frais.html" onclick="ouvrirFrais(); return false;">frais</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>
            </div>
            <h2>
                <div class="titre" style="font-size: 24px; font-weight: bold;">Sarra & Ferid</div>
                <i class="bi bi-hourglass-split"></i>
                Le grand jour approche...
            </h2>
            <div class="subtitle">            29 Mai 2027 • 21:00            </div>
            <div id="countdown">

                    <div class="box">
                    <div class="value" id="days">0</div>
                    <div class="label">Jours</div>
                    </div>

                    <div class="box">
                    <div class="value" id="hours">00</div>
                    <div class="label">Heures</div>
                    </div>

                    <div class="box">
                    <div class="value" id="minutes">00</div>
                    <div class="label">Minutes</div>
                    </div>

                    <div class="box">
                    <div class="value" id="seconds">00</div>
                    <div class="label">Secondes</div>
                    </div>
            </div>
        </div>
    </main>
    <script>
            const menu = document.getElementById("menu");
            const menuText = document.getElementById("menuText");
            const menuIcon = document.getElementById("menuIcon");
            const menuHeader = document.getElementById("toggleMenu");

            menuIcon.onclick = (e) => {
                e.stopPropagation();

                menu.classList.toggle("open");
                menuHeader.classList.toggle("close-mode");

            
            };
    const target=new Date("2027-05-29T21:00:00").getTime();

    function updateCountdown(){

    const now=new Date().getTime();

    const distance=target-now;

    if(distance<=0){

    document.querySelector(".card").innerHTML=`
    <h2 style="font-size:55px;color:#e84d7a;">
    🎉 Félicitations ! 🎉
    </h2>

    <p style="margin-top:20px;font-size:28px;color:#555;">
    C'est le grand jour ❤️
    </p>
    `;

    return;

    }

    const days=Math.floor(distance/(1000*60*60*24));

    const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

    const minutes=Math.floor((distance%(1000*60*60))/(1000*60));

    const seconds=Math.floor((distance%(1000*60))/1000);

    document.getElementById("days").textContent=days;
    document.getElementById("hours").textContent=String(hours).padStart(2,"0");
    document.getElementById("minutes").textContent=String(minutes).padStart(2,"0");
    document.getElementById("seconds").textContent=String(seconds).padStart(2,"0");

    }

    updateCountdown();

    setInterval(updateCountdown,1000);
    ///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
    function ouvrirFrais() {
        if (document.startViewTransition) {
            document.startViewTransition(() => {
                window.location.href = "frais.html";
            });
        } else {
            window.location.href = "frais.html";
        }
    }
    if (!document.startViewTransition) {
        document.documentElement.classList.add("no-view-transition");
    }
    </script>
    </body>
</html>
