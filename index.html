<!DOCTYPE html>
<html lang="fr">
    <head>
        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#e84d7a">
        <meta name="mobile-web-app-capable" content="yes">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <title>Sarra & Ferid</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <main>
            <div class="card">
                <div id="logo"></div>
                <div class="menu-panel" id="menu">
                    <div class="menu-header" id="toggleMenu">
                        <span class="menu-title" id="menuText">MENU</span>
                    </div>
                    <div class="menu-content">
                        <ul>
                            <li><a href="#">Moments douces</a></li>
                            <li><a href="#">Cagnotte</a></li>
                            <li><a href="frais.html">Préparatifs</a></li>
                            <li><a href="#">Social</a></li>
                        </ul>
                    </div>
                </div>
                <!-- POINT 3 : div → span (block dans inline = HTML invalide) -->
                <h2>
                    <span class="titre">Sarra & Ferid</span><br>
                    <i class="bi bi-hourglass-split"></i>
                </h2>
                <h3>
                    Le grand jour approche...
                </h3>
                <div class="subtitle">29 Mai 2027 • 21:00</div>
                <div id="countdown">
                    <div class="box">
                        <div class="value" id="days">0</div>
                        <div class="label">Jours</div>
                    </div>
                    <div class="box">
                        <div class="value" id="hours">00</div>
                        <div class="label">Heures</div>
                    </div>
                    <div class="box">
                        <div class="value" id="minutes">00</div>
                        <div class="label">Minutes</div>
                    </div>
                    <div class="box">
                        <div class="value" id="seconds">00</div>
                        <div class="label">Secondes</div>
                    </div>
                </div>
            </div>
        </main>
        <div id="slideshow">
            <div class="slide active" style="background-image: url('photos/photo1.jpg')"></div>
            <div class="slide" style="background-image: url('photos/photo2.jpg')"></div>
            <div class="slide" style="background-image: url('photos/photo3.jpg')"></div>
        </div>
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/fersar/sw.js');
            }
        </script>
        <script>
            // Slideshow
            const slides = document.querySelectorAll('.slide');
            let current = 0;
 
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 4000);
 
            // Menu
            const menu = document.getElementById("menu");
            const menuText = document.getElementById("menuText");
            const menuHeader = document.getElementById("toggleMenu");
            const card = document.querySelector('.card');
 
            menuText.onclick = (e) => {
                e.stopPropagation();
                menu.classList.toggle("open");
                menuHeader.classList.toggle("close-mode");
 
                if (menu.classList.contains("open")) {
                    const cardHeight = card.offsetHeight;
                    // POINT 6 : hauteur dynamique uniquement via JS, plus de valeur fixe CSS
                    menu.style.height = `${cardHeight - 40}px`;
                } else {
                    menu.style.height = "";
                }
            };
 
            // Countdown
            const target = new Date("2027-05-29T21:00:00").getTime();
 
            function updateCountdown() {
                const now = new Date().getTime();
                const distance = target - now;
 
                if (distance <= 0) {
                    document.querySelector(".card").innerHTML = `
                        <h2 style="font-size:55px;color:#e84d7a;">
                        🎉 Félicitations ! 🎉
                        </h2>
                        <p style="margin-top:20px;font-size:28px;color:#555;">
                        C'est le grand jour ❤️
                        </p>
                    `;
                    return;
                }
 
                const days    = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours   = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
 
                document.getElementById("days").textContent    = days;
                document.getElementById("hours").textContent   = String(hours).padStart(2, "0");
                document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
                document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
            }
 
            updateCountdown();
            setInterval(updateCountdown, 1000);
        </script>
    </body>
</html>
